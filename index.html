<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/png" href="img/favicon.png" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <title>Our Love Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@400;500;700&family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div id="canvas-container"></div>
    <div id="wrapper">
        <h1 class="animate__animated animate__fadeInDown">Our Journey</h1>

        <div id="clock-box" class="animate__animated animate__zoomIn animate__delay-1s">
            <div id="clock">
                <date>0 DAYS</date>
                <time>00:00:00</time>
            </div>
        </div>

        <div class="timeline-button-container animate__animated animate__zoomIn animate__delay-1s">
            <button type="button" class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#timelineModal">
                📜 Dòng Thời Gian Kỷ Niệm
            </button>
        </div>

        <div id="info" class="animate__animated animate__fadeInUp animate__delay-2s">
            <div class="one">
                <div class="avatar-container">
                    <img src="img/nghia.jpg" class="avt" alt="Hoàng Đình Nghĩa">
                </div>
                <p>Hoàng Đình Nghĩa</p>
            </div>
            <div id="heart">
                ❤<anni>...</anni>
            </div>
            <div class="two">
                <div class="avatar-container">
                    <img src="img/lynk.jpg" class="avt" alt="Ngô Thùy Linh">
                </div>
                <p>Ngô Thùy Linh</p>
            </div>
        </div>

        <footer class="animate__animated animate__fadeIn animate__delay-3s">Made with 𝖀𝖔𝖆̀𝖓𝖌 𝕯𝖎𝖓𝖍 𝕹𝖌𝖍𝖎̃𝖆 ♥️</footer>
    </div>

    <div class="modal fade" id="timelineModal" tabindex="-1" aria-labelledby="timelineModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="timelineModalLabel">Our Milestones 💖</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul class="timeline">
                        <li class="timeline-item">
                            <div class="timeline-marker"></div>
                            <div class="timeline-content">
                                <h3>Đang tải kỷ niệm...</h3>
                            </div>
                        </li>
                    </ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#addMilestoneModal">
                        ✨ Thêm Kỷ Niệm Mới
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addMilestoneModal" tabindex="-1" aria-labelledby="addMilestoneModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addMilestoneModalLabel">Thêm Kỷ Niệm Mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="milestone-form">
                        <div class="mb-3">
                            <label for="milestone-date" class="form-label">Ngày Kỷ Niệm</label>
                            <input type="date" class="form-control" id="milestone-date" required>
                        </div>
                        <div class="mb-3">
                            <label for="milestone-title" class="form-label">Tiêu Đề</label>
                            <input type="text" class="form-control" id="milestone-title" placeholder="Ví dụ: Chuyến đi Đà Lạt" required>
                        </div>
                        <div class="mb-3">
                            <label for="milestone-description" class="form-label">Nội Dung</label>
                            <textarea class="form-control" id="milestone-description" rows="3" placeholder="Kể lại câu chuyện của bạn..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Lưu Kỷ Niệm</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://unpkg.com/typeit@8.7.1/dist/index.umd.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>

</html>
